name: Sync Spon Stats

on:
  schedule:
    # 💡 한국 시간(KST) 오전 9시, 오후 9시에 실행 (UTC 0시, 12시)
    - cron: '15 0,12 * * *'
  workflow_dispatch: # 💡 깃허브 웹페이지에서 수동으로도 [Run workflow] 버튼을 눌러 실행할 수 있게 엽니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬(Python) 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 스폰 데이터 수집 스크립트 실행
      run: |
        python "update_spon.py"
